<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mon Shampoing 💧</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shampoing">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Mon Shampoing 💧</h1>
    </header>

    <div class="card" id="card">
      <div id="cardContent"></div>
      <div class="divider"></div>
      <div class="badge" id="badge"></div>
    </div>

    <button class="btn btn-wash" id="btnWash" onclick="washToday()">
      💧 <span id="btnLabel">J'ai lavé aujourd'hui !</span>
    </button>

    <button class="btn btn-secondary" onclick="openModal()">
      📅 Ajouter une date passée
    </button>

    <div id="history"></div>
  </div>

  <div class="toast" id="toast">🎉 Super ! Lavage enregistré.</div>

  <div class="overlay" id="overlay" onclick="overlayTap(event)">
    <div class="modal">
      <div class="modal-header">
        <button class="modal-btn cancel" onclick="closeModal()">Annuler</button>
        <span class="modal-title">Choisir une date</span>
        <button class="modal-btn confirm" onclick="addPast()">Ajouter</button>
      </div>
      <input type="date" id="picker" max="">
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
